name: SonarQube Cloud

"on":
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: read

jobs:
  sonar:
    name: SonarQube Cloud
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Cloud Scan
        id: sonar-scan
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Show SonarQube Cloud task details
        if: always() && steps.sonar-scan.outcome == 'failure'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: bash
        run: |
          if [ ! -f .scannerwork/report-task.txt ]; then
            echo "Sonar report-task.txt was not generated."
            exit 0
          fi

          ce_task_url="$(grep '^ceTaskUrl=' .scannerwork/report-task.txt | cut -d= -f2-)"
          dashboard_url="$(grep '^dashboardUrl=' .scannerwork/report-task.txt | cut -d= -f2-)"

          echo "Sonar dashboard: ${dashboard_url}"
          echo "Sonar CE task: ${ce_task_url}"

          if [ -n "${ce_task_url}" ]; then
            curl --fail --silent --show-error -u "${SONAR_TOKEN}:" "${ce_task_url}" -o ce-task.json || true
            python3 -m json.tool ce-task.json || true

            analysis_id="$(python3 -c 'import json; print(json.load(open("ce-task.json", encoding="utf-8")).get("task", {}).get("analysisId", ""))' 2>/dev/null || true)"
            if [ -n "${analysis_id}" ]; then
              quality_gate_url="https://sonarcloud.io/api/qualitygates/project_status?analysisId=${analysis_id}"
              echo "Sonar quality gate: ${quality_gate_url}"
              curl --fail --silent --show-error -u "${SONAR_TOKEN}:" "${quality_gate_url}" | python3 -m json.tool || true
            fi
          fi

      - name: Fail when SonarQube Cloud scan failed
        if: steps.sonar-scan.outcome == 'failure'
        run: exit 1
