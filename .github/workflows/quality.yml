name: Quality Gates

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Audit high vulnerabilities
        run: npm run audit:high

      - name: Audit build output
        run: npm run audit:build

      - name: Check performance budgets
        run: npm run check:performance

  smoke:
    name: Supabase Smokes
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start

      - name: Smoke — guest provisioning
        run: supabase db query --local --file supabase/smoke-tests/auth_guest_provisioning.sql --output table

      - name: Smoke — player snapshot RPC
        run: supabase db query --local --file supabase/smoke-tests/player_snapshot_rpc.sql --output table

      - name: Smoke — adventure and shop RPCs
        run: supabase db query --local --file supabase/smoke-tests/adventure_shop_rpcs.sql --output table

      - name: Smoke — ladder RPC
        run: supabase db query --local --file supabase/smoke-tests/ladder_rpc.sql --output table

      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup
